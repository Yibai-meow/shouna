    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 0 auto; padding: 15px; background: #f9f9f9; }
        button { font-size: 1em; padding: 12px 18px; margin: 8px 4px; border: none; border-radius: 12px; background: #007aff; color: white; transition: 0.2s; }
        button:active { opacity: 0.7; }
        .export-btn { background: #34c759; }
        input, textarea { font-size: 1em; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #ddd; margin: 8px 0; }
        ul { list-style: none; padding: 0; }
        li { background: white; padding: 14px; margin: 10px 0; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .item-text strong { font-size: 1.1em; }
        .location { color: #666; font-size: 0.9em; }
        .time { font-size: 0.8em; color: #aaa; display: block; }
        #status { color: #888; margin: 10px 0; font-size: 0.9em; }
        .setting-box { background: #fff; padding: 15px; border-radius: 12px; margin: 15px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .small-btn { padding: 6px 12px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h2>📦 收纳神器</h2>
    <div>
        <button onclick="startRecord()">🎤 语音记录</button>
        <button onclick="manualAdd()">✏️ 手动记录</button>
        <button onclick="listAll()">📋 全部物品</button>
        <button class="export-btn" onclick="exportToCSV()">📥 导出表格</button>
    </div>
    <p>🔎 找东西：<input type="text" id="searchInput" placeholder="试试说“剪指甲的东西”或“充电宝”">
    </p>
    <p id="status"></p>
    <ul id="itemList"></ul>

    <div class="setting-box">
        <p style="margin-top:0"><strong>🧠 语义搜索</strong> <span style="font-size:0.8em;color:#666;">（基于AI，自动理解你找什么）</span></p>
        <p style="font-size:0.9em;">现在你不需要手动添加同义词了，搜索“剪指甲的玩意儿”就能找到“指甲刀”。</p>
    </div>
    <script>
    // 注册 Service Worker（PWA 离线缓存，Chrome 全屏必要条件）
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('data:application/javascript;base64,' + btoa(
                'self.addEventListener("fetch", e => {})'
            )).catch(() => {});
        });
    }

    const STORAGE_KEY = 'storage_genius_v3';

    // ---------- 语义搜索核心（带自动重试）----------
    async function getEmbedding(text, retries = 1) {
    // 三个 API 端点：主站 + 两个国内镜像
    const urls = [
        'https://api-inference.huggingface.co/models/shibing624/text2vec-base-chinese',
        'https://hf-mirror.com/api/inference/models/shibing624/text2vec-base-chinese',
        'https://huggingface.co/api/inference/models/shibing624/text2vec-base-chinese'
    ];

    for (let urlIdx = 0; urlIdx < urls.length; urlIdx++) {
        const url = urls[urlIdx];
        for (let i = 0; i <= retries; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ inputs: text })
                });
                if (!response.ok) throw new Error('API response error');
                const result = await response.json();
                console.log('✅ 语义服务连接成功，使用:', url);
                return result;
            } catch (e) {
                console.error(`请求失败 (${url}, 尝试 ${i + 1}/${retries + 1}):`, e);
                if (i < retries) {
                    await new Promise(resolve => setTimeout(resolve, 3000));
                }
            }
        }
    }
    throw new Error('所有镜像均无法连接语义服务');
    }
    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0, normA = 0, normB = 0;
        for (let i = 0; i < vecA.length; i++) {
            dotProduct += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    let itemEmbeddings = [];

    async function buildIndex() {
        const items = getItems();
        if (items.length === 0) {
            itemEmbeddings = [];
            return;
        }
        document.getElementById('status').innerText = '🧠 正在理解你的物品...';
        try {
            const names = items.map(i => i.item);
            const embeddings = await getEmbedding(names);
            itemEmbeddings = items.map((item, idx) => ({
                id: item.id,
                embedding: embeddings[idx]
            }));
            document.getElementById('status').innerText = '✅ 语义索引已就绪';
        } catch (e) {
            console.error('语义索引构建失败:', e);
            document.getElementById('status').innerText = '🔄 语义服务连接失败，稍后会自动重试';
            itemEmbeddings = [];
            // 一分钟后自动重试
            setTimeout(() => buildIndex(), 60000);
        }
    }

    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function getItems() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveItems(items) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function parseSpokenText(text) {
        const match = text.match(/把(.+?)放在(.+)/);
        return match ? { item: match[1].trim(), location: match[2].trim() } : { item: text, location: '未指定' };
    }

    function addItemFromText(text) {
        const { item, location } = parseSpokenText(text);
        const items = getItems();
        items.push({
            id: generateId(),
            item,
            location,
            raw: text,
            time: new Date().toLocaleString()
        });
        saveItems(items);
        document.getElementById('status').innerText = '✅ 已记录：' + item + ' → ' + location;
        listAll();
        buildIndex();
    }

    // ---------- 手动输入 ----------
    function manualAdd() {
        const text = prompt('请输入物品和位置，例如：\n指甲刀，鞋柜\n（用逗号分隔物品和位置）');
        if (text && text.trim()) {
            addItemFromText(text);
        }
    }
                // ---------- 语音录入（修复秒断问题：延迟启动）----------
        function startRecord() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('当前浏览器不支持语音，你可以使用“手动记录”按钮。');
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.interimResults = false;
            document.getElementById('status').innerText = '🎙️ 正在准备...';

            recognition.onresult = (event) => {
                const spokenText = event.results[0][0].transcript;
                document.getElementById('status').innerText = '识别：' + spokenText;
                addItemFromText(spokenText);
            };

            recognition.onerror = (event) => {
                document.getElementById('status').innerText = '❌ 识别出错：' + event.error + '，请用“手动记录”';
            };

            // 延迟启动，避免秒断
            setTimeout(() => {
                try {
                    recognition.start();
                    document.getElementById('status').innerText = '🎙️ 正在听... 说“我把XX放在了YY”';
                } catch (e) {
                    document.getElementById('status').innerText = '❌ 启动失败，请用“手动记录”';
                }
            }, 200);
        }

        // ---------- 搜索（语义增强）----------
        async function searchItem() {
            const rawKeyword = document.getElementById('searchInput').value.trim();
            if (!rawKeyword) { listAll(); return; }

            const items = getItems();
            if (items.length === 0) { listAll(); return; }

            // 如果语义索引还没建好，或者索引数量不对，尝试重新建立
            if (itemEmbeddings.length !== items.length) {
                document.getElementById('status').innerText = '🧠 正在建立语义索引，请稍后再搜...';
                await buildIndex();
            }

            if (itemEmbeddings.length === items.length) {
                try {
                    const queryEmbedding = await getEmbedding(rawKeyword);
                    const scores = items.map((item, idx) => {
                        const emb = itemEmbeddings.find(e => e.id === item.id);
                        if (!emb) return { item, score: 0 };
                        return { item, score: cosineSimilarity(queryEmbedding, emb.embedding) };
                    });
                    const filtered = scores
                        .filter(s => s.score > 0.5)
                        .sort((a, b) => b.score - a.score)
                        .map(s => s.item);
                    
                    renderList(filtered);
                    document.getElementById('status').innerText = filtered.length ? 
                        `🔍 语义搜索找到 ${filtered.length} 条` : '没找到，换个说法试试？';
                    return;
                } catch (e) {
                    console.log('语义搜索失败，回退到关键字搜索:', e);
                }
            }

            // 回退到关键字模糊搜索
            const lowerKeyword = rawKeyword.toLowerCase();
            const filtered = items.filter(i => 
                (i.item + ' ' + i.location + ' ' + i.raw).toLowerCase().includes(lowerKeyword)
            );
            renderList(filtered);
            document.getElementById('status').innerText = filtered.length ? 
                `找到 ${filtered.length} 条（关键字匹配）` : '没找到，试试说“剪指甲的工具”？';
        }

        function listAll() {
            renderList(getItems());
            document.getElementById('status').innerText = `共 ${getItems().length} 件物品`;
        }

        function renderList(items) {
            const ul = document.getElementById('itemList');
            ul.innerHTML = '';
            if (!items || items.length === 0) {
                ul.innerHTML = '<li style="justify-content:center;color:#aaa;">暂无物品，试试手动或语音记录</li>';
                return;
            }
            items.forEach(i => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div style="flex:1">
                        <div class="item-text"><strong>${escapeHtml(i.item)}</strong></div>
                        <span class="location">📍 ${escapeHtml(i.location)}</span>
                        <span class="time">${i.time || ''}</span>
                    </div>
                    <button class="small-btn" onclick="deleteItem('${i.id}')" style="background:#ff3b30;color:white;">删</button>
                `;
                ul.appendChild(li);
            });
        }

        function deleteItem(id) {
            if (!confirm('确定删除？')) return;
            let items = getItems();
            items = items.filter(i => i.id !== id);
            saveItems(items);
            listAll();
            buildIndex();
        }

        function exportToCSV() {
            const items = getItems();
            if (items.length === 0) { alert('无数据'); return; }
            let csv = '\uFEFF物品,位置,完整记录,时间\n';
            items.forEach(i => {
                csv += `"${i.item.replace(/"/g,'""')}","${i.location.replace(/"/g,'""')}","${i.raw.replace(/"/g,'""')}","${i.time||''}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `收纳记录_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            document.getElementById('status').innerText = '📁 表格已下载';
        }

        function escapeHtml(text) {
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchItem();
        });

        window.addEventListener('load', () => {
            listAll();
            buildIndex();
        });
    </script>
</body>
