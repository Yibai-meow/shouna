<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="theme-color" content="#007aff">

    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 0 auto; padding: 15px; background: #f9f9f9; }
        button { font-size: 1em; padding: 12px 18px; margin: 8px 4px; border: none; border-radius: 12px; background: #007aff; color: white; transition: 0.2s; }
        button:active { opacity: 0.7; }
        .export-btn { background: #34c759; }
        input, textarea { font-size: 1em; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #ddd; margin: 8px 0; }
        ul { list-style: none; padding: 0; }
        li { background: white; padding: 14px; margin: 10px 0; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .item-text strong { font-size: 1.1em; }
        .location { color: #666; font-size: 0.9em; }
        .time { font-size: 0.8em; color: #aaa; display: block; }
        #status { color: #888; margin: 10px 0; font-size: 0.9em; }
        .small-btn { padding: 6px 12px; font-size: 0.9em; }
        .settings-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .settings-row input { flex: 1; }
    </style>
</head>
<body>
    <h2>📦 收纳神器</h2>
    <div>
        <button onclick="startRecord()">🎤 语音记录</button>
        <button onclick="manualAdd()">✏️ 手动记录</button>
        <button onclick="listAll()">📋 全部物品</button>
        <button class="export-btn" onclick="exportToCSV()">📥 导出表格</button>
    </div>
    <p>🔎 找东西：<input type="text" id="searchInput" placeholder="试试说"剪指甲的东西"或"充电宝"">
    </p>
    <p id="status"></p>
    <ul id="itemList"></ul>

    <div class="setting-box" style="margin-top:15px;">
        <p style="margin-top:0"><strong>🔑 AI 语义搜索设置</strong></p>
        <p style="font-size:0.8em;color:#666;">输入 DeepSeek API Key 启用智能搜索（Key 只存你手机里，不上传）</p>
        <div class="settings-row">
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
            <button onclick="saveApiKey()">💾 保存</button>
        </div>
        <p id="keyStatus" style="font-size:0.8em;color:#888;"></p>
    </div>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('data:application/javascript;base64,' + btoa(
                'self.addEventListener("fetch", e => {})'
            )).catch(() => {});
        });
    }

    const STORAGE_KEY = 'storage_genius_v7';
    const API_KEY_STORAGE = 'deepseek_api_key';

    // ---------- API Key 管理 ----------
    function getApiKey() {
        return localStorage.getItem(API_KEY_STORAGE) || '';
    }

    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (!key) {
            document.getElementById('keyStatus').innerText = '⚠️ 请输入 Key';
            return;
        }
        localStorage.setItem(API_KEY_STORAGE, key);
        document.getElementById('apiKeyInput').value = '';
        document.getElementById('keyStatus').innerText = '✅ Key 已保存（仅存于本设备）';
    }

    // 页面加载时显示 Key 状态
    (function checkKeyStatus() {
        const savedKey = getApiKey();
        if (savedKey) {
            document.getElementById('keyStatus').innerText = '✅ Key 已配置，语义搜索可用';
            document.getElementById('apiKeyInput').placeholder = '已保存，无需重复输入';
        } else {
            document.getElementById('keyStatus').innerText = '⚠️ 未配置 Key，将使用本地搜索';
        }
    })();

    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function getItems() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveItems(items) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function parseSpokenText(text) {
        const match = text.match(/把(.+?)放在(.+)/);
        return match ? { item: match[1].trim(), location: match[2].trim() } : { item: text, location: '未指定' };
    }

    function addItemFromText(text) {
        const { item, location } = parseSpokenText(text);
        const items = getItems();
        items.push({
            id: generateId(),
            item,
            location,
            raw: text,
            time: new Date().toLocaleString()
        });
        saveItems(items);
        document.getElementById('status').innerText = '✅ 已记录：' + item + ' → ' + location;
        listAll();
    }

    function manualAdd() {
        const text = prompt('请输入物品和位置，例如：\n指甲刀，鞋柜\n（用逗号分隔物品和位置）');
        if (text && text.trim()) {
            addItemFromText(text);
        }
    }

    function startRecord() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert('当前浏览器不支持语音，你可以使用"手动记录"按钮。');
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.interimResults = false;
        document.getElementById('status').innerText = '🎙️ 正在准备...';

        recognition.onresult = (event) => {
            const spokenText = event.results[0][0].transcript;
            document.getElementById('status').innerText = '识别：' + spokenText;
            addItemFromText(spokenText);
        };

        recognition.onerror = (event) => {
            document.getElementById('status').innerText = '❌ 识别出错：' + event.error + '，请用"手动记录"';
        };

        setTimeout(() => {
            try {
                recognition.start();
                document.getElementById('status').innerText = '🎙️ 正在听... 说"我把XX放在了YY"';
            } catch (e) {
                document.getElementById('status').innerText = '❌ 启动失败，请用"手动记录"';
            }
        }, 200);
    }
                // ========== DeepSeek 语义搜索 ==========
        async function semanticSearch(query, items) {
            const apiKey = getApiKey();
            if (!apiKey) return null;

            const itemList = items.map(i => `"${i.item}"（位置：${i.location}）`).join('\n');
            
            const prompt = `你是家庭收纳助手。用户想找东西，可能用口语化描述。
用户说："${query}"

家里现有物品：
${itemList}

请判断用户最可能想找哪个物品。只回答物品名称，不要解释。如果没有匹配的，回答"无"。`;

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [{ role: 'user', content: prompt }],
                        max_tokens: 50,
                        temperature: 0
                    })
                });

                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                const answer = data.choices[0].message.content.trim();
                console.log('DeepSeek 返回:', answer);
                return answer === '无' ? null : answer;
            } catch (e) {
                console.error('DeepSeek 搜索失败:', e);
                return null;
            }
        }

        async function searchItem() {
    const rawKeyword = document.getElementById('searchInput').value.trim();
    if (!rawKeyword) { listAll(); return; }

    const items = getItems();
    if (items.length === 0) { listAll(); return; }

    // 优先使用 DeepSeek 语义搜索
    const apiKey = getApiKey();
    if (apiKey) {
        document.getElementById('status').innerText = '🤖 AI 正在理解...';
        const aiResult = await semanticSearch(rawKeyword, items);
        
        if (aiResult) {
            // 显示 AI 返回结果（方便调试，确认无误后可删除这行）
            alert('AI 返回的物品名是：' + aiResult);
            
            // 更宽容的匹配
            const matched = items.filter(i => {
                const itemLower = i.item.toLowerCase();
                const resultLower = aiResult.toLowerCase();
                return itemLower === resultLower ||
                       itemLower.includes(resultLower) ||
                       resultLower.includes(itemLower) ||
                       itemLower.split('').filter(char => resultLower.includes(char)).length >= 2;
            });
            if (matched.length > 0) {
                renderList(matched);
                document.getElementById('status').innerText = `🤖 AI 帮你找到了：${aiResult}`;
                return;
            } else {
                alert('AI 返回了"' + aiResult + '"，但本地没找到匹配的物品。');
            }
        }
    }

    // 回退：本地模糊搜索
    const lowerKeyword = rawKeyword.toLowerCase();
    const filtered = items.filter(i => 
        (i.item + ' ' + i.location + ' ' + i.raw).toLowerCase().includes(lowerKeyword)
    );
    renderList(filtered);
    document.getElementById('status').innerText = filtered.length ? 
        `🔍 找到 ${filtered.length} 条` : '没找到，换个说法试试？';
        }

        function listAll() {
            renderList(getItems());
            document.getElementById('status').innerText = `共 ${getItems().length} 件物品`;
        }

        function renderList(items) {
            const ul = document.getElementById('itemList');
            ul.innerHTML = '';
            if (!items || items.length === 0) {
                ul.innerHTML = '<li style="justify-content:center;color:#aaa;">暂无物品，试试手动或语音记录</li>';
                return;
            }
            items.forEach(i => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div style="flex:1">
                        <div class="item-text"><strong>${escapeHtml(i.item)}</strong></div>
                        <span class="location">📍 ${escapeHtml(i.location)}</span>
                        <span class="time">${i.time || ''}</span>
                    </div>
                    <button class="small-btn" onclick="deleteItem('${i.id}')" style="background:#ff3b30;color:white;">删</button>
                `;
                ul.appendChild(li);
            });
        }

        function deleteItem(id) {
            if (!confirm('确定删除？')) return;
            let items = getItems();
            items = items.filter(i => i.id !== id);
            saveItems(items);
            listAll();
        }

        function exportToCSV() {
            const items = getItems();
            if (items.length === 0) { alert('无数据'); return; }
            let csv = '\uFEFF物品,位置,完整记录,时间\n';
            items.forEach(i => {
                csv += `"${i.item.replace(/"/g,'""')}","${i.location.replace(/"/g,'""')}","${i.raw.replace(/"/g,'""')}","${i.time||''}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `收纳记录_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            document.getElementById('status').innerText = '📁 表格已下载';
        }

        function escapeHtml(text) {
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchItem();
        });

        window.addEventListener('load', () => {
            listAll();
        });
    </script>
</body>
</html>
