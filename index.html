<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>家庭收纳神器</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="收纳神器">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'></text></svg>">
    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 0 auto; padding: 15px; background: #f9f9f9; }
        button { font-size: 1em; padding: 12px 18px; margin: 8px 4px; border: none; border-radius: 12px; background: #007aff; color: white; transition: 0.2s; }
        button:active { opacity: 0.7; }
        .export-btn { background: #34c759; }
        input, textarea { font-size: 1em; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #ddd; margin: 8px 0; }
        ul { list-style: none; padding: 0; }
        li { background: white; padding: 14px; margin: 10px 0; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .item-text strong { font-size: 1.1em; }
        .location { color: #666; font-size: 0.9em; }
        .time { font-size: 0.8em; color: #aaa; display: block; }
        #status { color: #888; margin: 10px 0; font-size: 0.9em; }
        .setting-box { background: #fff; padding: 15px; border-radius: 12px; margin: 15px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .setting-box label { font-weight: bold; display: block; margin-bottom: 5px; }
        .small-btn { padding: 6px 12px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h2> 收纳神器</h2>
    <div>
        <button onclick="startRecord()"> 语音记录</button>
        <button onclick="listAll()"> 全部物品</button>
        <button class="export-btn" onclick="exportToCSV()"> 导出表格</button>
    </div>
    <p> 找东西：<input type="text" id="searchInput" placeholder="输入指甲剪、充电宝等，按回车搜索">
    </p>
    <p id="status"></p>
    <ul id="itemList"></ul>
    <div class="setting-box">
        <p style="margin-top:0"><strong>🧠 智能同义词管理</strong> <button class="small-btn" onclick="toggleSynonymBox()">展开/收起</button></p>
        <div id="synonymBox" style="display: none;">
            <p style="font-size:0.9em;">每行一组同义词，用 <b>=</b> 连接，如：<code>指甲刀=指甲剪=指甲钳</code></p>
            <textarea id="synonymInput" rows="4" placeholder="指甲刀=指甲剪=指甲钳&#10;充电宝=移动电源&#10;遥控器=遥控"></textarea>
            <button onclick="saveSynonyms()"> 保存同义词</button>
            <p style="font-size:0.8em;color:#888;">保存后，搜索“指甲剪”也会显示“指甲刀”的记录。</p>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'storage_genius_v3';
        const SYNONYM_KEY = 'synonym_map_v3';

        function getSynonymMap() {
            const raw = localStorage.getItem(SYNONYM_KEY);
            if (!raw) return {};
            try {
                return JSON.parse(raw);
            } catch (e) {
                return {};
            }
        }

        function saveSynonyms() {
            const text = document.getElementById('synonymInput').value.trim();
            const map = {};
            if (text) {
                const lines = text.split('\n');
                lines.forEach(line => {
                    const parts = line.split('=').map(s => s.trim()).filter(s => s);
                    if (parts.length >= 2) {
                        const group = parts;
                        group.forEach(word => {
                            map[word] = group;
                        });
                    }
                });
            }
            localStorage.setItem(SYNONYM_KEY, JSON.stringify(map));
            document.getElementById('status').innerText = '✅ 同义词已更新';
            displayCurrentSynonyms(map);
        }

        function displayCurrentSynonyms(map) {
            const groups = new Set();
            Object.values(map).forEach(arr => groups.add(arr.join('=')));
            document.getElementById('synonymInput').value = Array.from(groups).join('\n');
        }

        function expandKeyword(keyword) {
            const map = getSynonymMap();
            const lowerKeyword = keyword.toLowerCase();
            if (map[lowerKeyword]) {
                return map[lowerKeyword].slice();
            }
            return [keyword];
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function getItems() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function saveItems(items) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        }

        function parseSpokenText(text) {
            const match = text.match(/把(.+?)放在(.+)/);
            if (match) {
                return { item: match[1].trim(), location: match[2].trim() };
            }
            return { item: text, location: '未指定' };
        }

        function addItemFromText(text) {
            const { item, location } = parseSpokenText(text);
            const items = getItems();
            items.push({
                id: generateId(),
                item,
                location,
                raw: text,
                time: new Date().toLocaleString()
            });
            saveItems(items);
            document.getElementById('status').innerText = '✅ 已记录：' + item + ' → ' + location;
            listAll();
        }

        function startRecord() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('当前浏览器不支持语音，请用 Chrome 或 Edge 打开。');
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.interimResults = false;
            document.getElementById('status').innerText = '️ 正在听... 说“我把XX放在了YY”';
            recognition.start();

            recognition.onresult = (event) => {
                const spokenText = event.results[0][0].transcript;
                document.getElementById('status').innerText = '识别：' + spokenText;
                addItemFromText(spokenText);
            };

            recognition.onerror = (event) => {
                document.getElementById('status').innerText = '❌ 识别出错：' + event.error;
            };
        }

        function searchItem() {
            const rawKeyword = document.getElementById('searchInput').value.trim();
            if (!rawKeyword) { listAll(); return; }
            
            const items = getItems();
            const keywords = expandKeyword(rawKeyword);
            const lowerKeywords = keywords.map(k => k.toLowerCase());
            
            const filtered = items.filter(i => {
                const fields = (i.item + ' ' + i.location + ' ' + i.raw).toLowerCase();
                return lowerKeywords.some(kw => fields.includes(kw));
            });
            
            renderList(filtered);
            document.getElementById('status').innerText = filtered.length ? `找到 ${filtered.length} 条` : '没找到，试试同义词？可去下方设置。';
        }

        function listAll() {
            renderList(getItems());
            document.getElementById('status').innerText = `共 ${getItems().length} 件物品`;
        }

        function renderList(items) {
            const ul = document.getElementById('itemList');
            ul.innerHTML = '';
            if (items.length === 0) {
                ul.innerHTML = '<li style="justify-content:center;color:#aaa;">暂无物品，试试语音记录</li>';
                return;
            }
            items.forEach(i => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div style="flex:1">
                        <div class="item-text"><strong>${escapeHtml(i.item)}</strong></div>
                        <span class="location"> ${escapeHtml(i.location)}</span>
                        <span class="time">${i.time || ''}</span>
                    </div>
                    <button class="small-btn" onclick="deleteItem('${i.id}')" style="background:#ff3b30;color:white;">删</button>
                `;
                ul.appendChild(li);
            });
        }

        function deleteItem(id) {
            if (!confirm('确定删除？')) return;
            let items = getItems();
            items = items.filter(i => i.id !== id);
            saveItems(items);
            listAll();
        }

        function exportToCSV() {
            const items = getItems();
            if (items.length === 0) { alert('无数据'); return; }
            let csv = '\uFEFF物品,位置,完整记录,时间\n';
            items.forEach(i => {
                csv += `"${i.item.replace(/"/g,'""')}","${i.location.replace(/"/g,'""')}","${i.raw.replace(/"/g,'""')}","${i.time||''}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `收纳记录_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            document.getElementById('status').innerText = ' 表格已下载';
        }

        function escapeHtml(text) {
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function toggleSynonymBox() {
            const box = document.getElementById('synonymBox');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
            if (box.style.display === 'block') {
                displayCurrentSynonyms(getSynonymMap());
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchItem();
        });

        listAll();
    </script>
</body>
</html>
